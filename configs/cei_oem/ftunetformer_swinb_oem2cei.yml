# Model 1: FT-UNetFormer (Swin-B encoder + Global-Local Transformer decoder),
# trained on OpenEarthMap in the 7-class CEI scheme.
#
# Same data, splits and 7 classes as the other four models, so the comparison is
# architecture-only apart from the per-model optimiser settings noted below.
#
# The official release loads GeoSeg's stseg_base.pth, which is not redistributed.
# src/models/ftunetformer.py instead maps timm's ImageNet-22k Swin-B checkpoint
# onto the backbone (325/357 tensors; the rest are computed index buffers and
# the stage-output norms GeoSeg adds, which have no pretrained counterpart).
experiment:
  name: cei_m1_ftunetformer_swinb
  output_dir: ./experiments/cei_m1_ftunetformer_swinb
dataset:
  name: OpenEarthMap
  root: data/OpenEarthMap/OpenEarthMap_wo_xBD
  image_dir: <region>/images
  mask_dir: <region>/labels
  train_split: train_split_60.txt
  val_split: val_split_10.txt
  test_split: test_split_30.txt
  label_map: oem_to_cei
  image_size: 512
  crop_size: 512
  original_size: 1024
  num_classes: 7
  ignore_index: 255
  normalization: imagenet
  augment: false
  eval_mode: full
model:
  name: ftunetformer
  # encoder_name is unused here -- FT-UNetFormer fixes the Swin-B topology
  # (embed_dim 128, depths 2/2/18/2, heads 4/8/16/32). Kept for readability.
  encoder_name: swin_base_patch4_window7_224
  encoder_weights: imagenet    # null trains the encoder from scratch
  decode_channels: 256
  window_size: 8
  in_channels: 3
  num_classes: 7
training:
  # ~96M params, so the batch matches the other transformer model.
  batch_size: 4
  epochs: 100
  learning_rate: 0.00006
  optimizer: AdamW
  weight_decay: 0.01
  loss: cross_entropy
  scheduler: none
  mix_precision: true
  num_workers: 4
metrics:
  - OA
  - mIoU
  - mF1
  - per_class_IoU
  - per_class_F1
