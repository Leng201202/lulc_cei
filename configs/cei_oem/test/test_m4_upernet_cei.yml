# Model 4 evaluation: UPerNet + Swin-B, OEM-trained, tested on CEI.
#
#   python evaluate.py --config configs/cei_oem/test/test_m4_upernet_cei.yml --checkpoint experiments/cei_m4_upernet_swinb/checkpoints/best_checkpoint.pth --split test --tta
#
# Only the keys evaluate.py actually reads are kept -- see
# test_m2_uneteffb4_cei.yml for what was dropped and why.
experiment:
  name: cei_m4_upernet_swinb
  output_dir: ./experiments/cei_m4_upernet_swinb    # fallback when --output is omitted
dataset:
  name: CEI
  root: data/CEI_data
  # CEI keeps images and masks in two flat folders (no <region> level); mask
  # and image share the same filename:
  #   images/maesuai_2.tif  ->  masks/maesuai_2.tif
  image_dir: images
  mask_dir: masks
  # The CEI test set: tiles 1-100, all hand-labeled. Regenerate with
  #   python tools/cei/make_test_split.py --start 1 --end 100
  # Tiles 101-112 are labeled but deliberately left out of the test range.
  # Note maesuai_1 and _5 are blank/nodata captures labeled 100% Water; they are
  # included here by choice (--exclude-blank drops them).
  test_split: test_split.txt
  label_map: cei            # CEI ids 1-7 -> classes 0-6; on-disk 0 -> ignore
  crop_size: 1024
  num_classes: 7
  ignore_index: 255
  normalization: imagenet   # must match how the model was trained
  eval_mode: full           # score the whole 1024x1024 tile, no cropping
model:
  name: upernet
  encoder_name: tu-swin_base_patch4_window7_224.ms_in22k_ft_in1k
  encoder_params:
    # Not boilerplate: Swin is built for a fixed input size. Test tiles are
    # 1024, not the 512 training crop. Swin's weights are resolution-
    # independent (0 shape mismatches), so a 512-trained checkpoint loads here.
    img_size: 1024
  in_channels: 3
  num_classes: 7
training:
  loss: cross_entropy       # used to report test loss
  num_workers: 4
