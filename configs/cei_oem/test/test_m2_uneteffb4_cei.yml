# Model 2 evaluation: U-Net + EfficientNet-B4, OEM-trained, tested on CEI.
#
#   python evaluate.py --config configs/unet/cei/test/test_m2_uneteffb4_cei.yml \
#       --checkpoint experiments/cei_exp01_oem2cei/checkpoints/best_checkpoint.pth \
#       --split test --tta
#
# Only the keys evaluate.py actually reads are kept. Notably absent:
#   model.encoder_weights  -- evaluate.py forces it to None; the checkpoint
#                             supplies every weight, so nothing is downloaded.
#   training.batch_size    -- ignored under eval_mode: full, which scores one
#                             full-size tile at a time.
#   epochs / lr / optimizer / weight_decay / scheduler / mix_precision, metrics
#                          -- training-only or purely descriptive.
# num_classes appears in both dataset and model on purpose: validate_config
# cross-checks them, which is what catches a 7-vs-8 class mismatch up front.
experiment:
  name: cei_exp01_oem2cei
  output_dir: ./experiments/cei_exp01_oem2cei    # fallback when --output is omitted
dataset:
  name: CEI
  root: data/CEI_data
  # CEI keeps images and masks in two flat folders (no <region> level); mask
  # and image share the same filename:
  #   images/maesuai_2.tif  ->  masks/maesuai_2.tif
  image_dir: images
  mask_dir: masks
  # The CEI test set: tiles 1-100, all hand-labeled. Regenerate with
  #   python tools/cei/make_test_split.py --start 1 --end 100
  # Tiles 101-112 are labeled but deliberately left out of the test range.
  # Note maesuai_1 and _5 are blank/nodata captures labeled 100% Water; they are
  # included here by choice (--exclude-blank drops them).
  test_split: test_split.txt
  label_map: cei            # CEI ids 1-7 -> classes 0-6; on-disk 0 -> ignore
  crop_size: 1024
  num_classes: 7
  ignore_index: 255
  normalization: imagenet   # must match how the model was trained
  eval_mode: full           # score the whole 1024x1024 tile, no cropping
model:
  # The checkpoint stores weights only, so the architecture is rebuilt from
  # here and must match the one that was trained.
  name: unet
  encoder_name: efficientnet-b4
  in_channels: 3
  num_classes: 7
training:
  loss: cross_entropy       # used to report test loss
  num_workers: 4
