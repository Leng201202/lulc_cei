# CEI test config for the 3-epoch smoke run of upernet_swinb_oem2cei.
# Generated by tools/cei/make_smoke_configs.py -- do not hand-edit.
experiment:
  name: cei_m4_upernet_swinb_smoke
  output_dir: ./experiments/cei_m4_upernet_swinb_smoke
dataset:
  name: CEI
  root: data/CEI_data
  image_dir: images
  mask_dir: masks
  test_split: test_split.txt
  label_map: cei
  image_size: 1024
  crop_size: 1024
  original_size: 1024
  num_classes: 7
  ignore_index: 255
  normalization: imagenet
  augment: false
  eval_mode: full
model:
  name: upernet
  encoder_name: tu-swin_base_patch4_window7_224.ms_in22k_ft_in1k
  encoder_weights: imagenet
  encoder_params:
    img_size: 1024
  in_channels: 3
  num_classes: 7
training:
  batch_size: 1
  epochs: 200
  learning_rate: 6.0e-05
  optimizer: AdamW
  weight_decay: 0.01
  loss: cross_entropy
  scheduler: none
  mix_precision: true
  num_workers: 4
metrics:
- OA
- mIoU
- mF1
- per_class_IoU
- per_class_F1
