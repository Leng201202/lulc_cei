# CEI test config for the 3-epoch smoke run of unetformer_r101_oem2cei.
# Generated by tools/cei/make_smoke_configs.py -- do not hand-edit.
experiment:
  name: cei_m3_unetformer_r101_smoke
  output_dir: ./experiments/cei_m3_unetformer_r101_smoke
dataset:
  name: CEI
  root: data/CEI_data
  image_dir: images
  mask_dir: masks
  test_split: test_split.txt
  label_map: cei
  image_size: 1024
  crop_size: 1024
  original_size: 1024
  num_classes: 7
  ignore_index: 255
  normalization: imagenet
  augment: false
  eval_mode: full
model:
  name: unetformer
  encoder_name: resnet101
  encoder_weights: imagenet
  decode_channels: 64
  window_size: 8
  dropout: 0.1
  in_channels: 3
  num_classes: 7
training:
  batch_size: 1
  epochs: 200
  learning_rate: 0.0001
  optimizer: AdamW
  weight_decay: 1.0e-06
  loss: cross_entropy
  aux_weight: 0.4
  scheduler: none
  mix_precision: true
  num_workers: 4
metrics:
- OA
- mIoU
- mF1
- per_class_IoU
- per_class_F1
