experiment:
  name: exp_01_unet_effb4_oem
  output_dir: ./experiments/exp_01_unet_effb4_oem
dataset:
  name: OpenEarthMap
  root: data/OpenEarthMap/OpenEarthMap_wo_xBD
  image_dir: <region>/images
  mask_dir: <region>/labels
  train_split: train_split_60.txt
  val_split: val_split_10.txt
  test_split: test_split_30.txt
  image_size: 512
  crop_size: 512
  original_size: 1024
  num_classes: 8
  ignore_index: 255
model:
  name: unet
  encoder_name: efficientnet-b4
  encoder_weights: imagenet
  in_channels: 3
  num_classes: 8
training:
  batch_size: 2
  epochs: 50
  learning_rate: 0.0001
  optimizer: AdamW
  loss: ce_dice
  mix_precision: true
  weight_decay: 0.01
metrics:
  - OA
  - mIoU
  - mF1
  - per_class_IoU
