experiment:
  name: oem_sar_rgb_real5_pretrained
  output_dir: ./experiments/oem_sar_rgb_real5_pretrained
dataset:
  name: OpenEarthMap
  root: data/OpenEarthMap
  image_dir: <region>/images
  mask_dir: <region>/labels
  train_split: train_split_60.txt
  val_split: val_split_10.txt
  test_split: test_split_30.txt
  image_size: 512
  crop_size: 512
  original_size: 1024
  num_classes: 8
  ignore_index: 255
  # These weights were trained on [0,1]-scaled inputs (divide by 255), NOT
  # ImageNet mean/std. Using imagenet normalization here yields garbage.
  normalization: zero_one
model:
  # External OpenEarthMap-SAR baseline: U-Net / EfficientNet-B4 with SCSE
  # decoder attention and a 9-class head (index 0 = background). The leading
  # background channel is dropped so the model behaves as an 8-class model
  # aligned with the training class order (0-7).
  name: unet
  encoder_name: efficientnet-b4
  encoder_weights: imagenet
  in_channels: 3
  num_classes: 8
  decoder_attention_type: scse
  pretrained_classes: 9
training:
  batch_size: 2
  epochs: 50
  learning_rate: 0.0001
  optimizer: AdamW
  loss: ce_dice
  mix_precision: true
  weight_decay: 0.01
metrics:
  - OA
  - mIoU
  - mF1
  - per_class_IoU
