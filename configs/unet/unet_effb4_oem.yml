experiment:
  name: exp_01_unet_effb4_oem
  output_dir: ./experiments/exp_01_unet_effb4_oem
dataset:
  name: OpenEarthMap
  root: data/OpenEarthMap
  image_size: 512
  crop_size: 512
  original_size: 1000
  num_classes: 8
  ignore_index: 255
model:
  name: UNet
  encoder_name: efficientnet-b4
  encoder_weights: imagenet
  in_channels: 3
  num_classes: 8
training:
  batch_size: 2
  epochs: 50
  learning_rate: 0.0001
  optimizer: Adam
  loss: ce_dice
  mix_precision: true
metrics:
  - OA
  - mIoU
  - mF1
  - per_class_IoU
