# Model 4: UPerNet + Swin-B, trained on OpenEarthMap in the 7-class CEI scheme.
#
# Same data, same recipe, same 7 classes as unet_effb4_oem2cei.yml -- only the
# architecture differs, so the two are directly comparable.
#
# Swin is built for a fixed 224x224 input and raises "Input height doesn't match
# model" at 512 unless encoder_params.img_size is set to the crop size. If you
# change dataset.crop_size, change encoder_params.img_size to match.
experiment:
  name: cei_m4_upernet_swinb
  output_dir: ./experiments/cei_m4_upernet_swinb
dataset:
  name: OpenEarthMap
  root: data/OpenEarthMap/OpenEarthMap_wo_xBD
  image_dir: <region>/images
  mask_dir: <region>/labels
  train_split: train_split_60.txt
  val_split: val_split_10.txt
  test_split: test_split_30.txt
  label_map: oem_to_cei
  image_size: 512
  crop_size: 512
  original_size: 1024
  num_classes: 7
  ignore_index: 255
  normalization: imagenet
  augment: false
  eval_mode: full
model:
  name: upernet
  # "tu-" pulls the backbone from timm. This is Swin-B pretrained on ImageNet-22k
  # and fine-tuned on 1k -- the strongest of the three available Swin-B weights.
  encoder_name: tu-swin_base_patch4_window7_224.ms_in22k_ft_in1k
  encoder_weights: imagenet
  encoder_params:
    img_size: 512     # must equal dataset.crop_size
  in_channels: 3
  num_classes: 7
training:
  # Swin-B is ~97M params vs EfficientNet-B4's ~20M, so the batch is halved to
  # fit alongside full-image validation. Transformers also prefer a lower LR.
  batch_size: 4
  epochs: 200
  learning_rate: 0.00006
  optimizer: AdamW
  weight_decay: 0.01
  loss: cross_entropy
  scheduler: none
  mix_precision: true
  num_workers: 4
metrics:
  - OA
  - mIoU
  - mF1
  - per_class_IoU
  - per_class_F1
