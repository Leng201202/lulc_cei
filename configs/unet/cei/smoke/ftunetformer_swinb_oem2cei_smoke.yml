# 3-epoch smoke test generated from ftunetformer_swinb_oem2cei.yml.
# Identical to the real config apart from epochs and output_dir.
# Regenerate with tools/cei/make_smoke_configs.py -- do not hand-edit.
experiment:
  name: cei_m1_ftunetformer_swinb_smoke
  output_dir: ./experiments/cei_m1_ftunetformer_swinb_smoke
dataset:
  name: OpenEarthMap
  root: data/OpenEarthMap/OpenEarthMap_wo_xBD
  image_dir: <region>/images
  mask_dir: <region>/labels
  train_split: train_split_60.txt
  val_split: val_split_10.txt
  test_split: test_split_30.txt
  label_map: oem_to_cei
  image_size: 512
  crop_size: 512
  original_size: 1024
  num_classes: 7
  ignore_index: 255
  normalization: imagenet
  augment: false
  eval_mode: full
model:
  name: ftunetformer
  encoder_name: swin_base_patch4_window7_224
  encoder_weights: imagenet
  decode_channels: 256
  window_size: 8
  in_channels: 3
  num_classes: 7
training:
  batch_size: 4
  epochs: 3
  learning_rate: 6.0e-05
  optimizer: AdamW
  weight_decay: 0.01
  loss: cross_entropy
  scheduler: none
  mix_precision: true
  num_workers: 4
metrics:
- OA
- mIoU
- mF1
- per_class_IoU
- per_class_F1
