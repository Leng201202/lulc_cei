experiment:
  name: exp_02_unet_effb4_oem_paper
  output_dir: ./experiments/exp_02_unet_effb4_oem_paper
dataset:
  name: OpenEarthMap
  root: data/OpenEarthMap/OpenEarthMap_wo_xBD
  image_dir: <region>/images
  mask_dir: <region>/labels
  train_split: train_split_60.txt
  val_split: val_split_10.txt
  test_split: test_split_30.txt
  image_size: 512
  crop_size: 512
  original_size: 1024
  num_classes: 8
  ignore_index: 255
  normalization: imagenet   # mean/std ImageNet (matches paper)
  augment: false            # paper: random crop only, no flip/rotate
  eval_mode: full           # paper: full-image eval (pad to /32, unpad via ignore)
model:
  name: unet
  encoder_name: efficientnet-b4
  encoder_weights: imagenet
  in_channels: 3
  num_classes: 8
training:
  batch_size: 8
  epochs: 200
  learning_rate: 0.0001
  optimizer: AdamW
  weight_decay: 0.000001    # 1e-6 (paper)
  loss: cross_entropy       # paper: CrossEntropyLoss only
  scheduler: none           # paper: constant LR
  mix_precision: true
metrics:
  - OA
  - mIoU
  - mF1
  - per_class_IoU
  - per_class_F1
